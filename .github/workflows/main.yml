# ============================================================
# Secure AppSec Pipeline — Java Spring Boot
# ============================================================
# Güncellemeler (v2):
#   - semgrep/semgrep-action (deprecated) → semgrep/semgrep Docker container
#   - dependency-check/Dependency-Check_Action@main → Maven Plugin
#   - Tüm action'lar SHA-pinned
#   - Least-privilege permissions
#   - Paralel güvenlik job'ları
#   - Secrets scanning (Gitleaks)
#   - SAST: Semgrep (Docker) + CodeQL
#   - SCA: OWASP DC (Maven Plugin) + Trivy
#   - SBOM: Trivy (CycloneDX)
#   - SARIF → GitHub Security tab
#   - Maven dependency cache
#   - Security gate (tek merge-blocking status check)
#   - Concurrency kontrolü
#   - Timeout guard
# ============================================================

name: AppSec Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # Manuel yeniden tarama için

# Aynı PR/branch için eski çalışmaları iptal et
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow seviyesinde minimum izin
permissions:
  contents: read

# ============================================================
# JOB 1: Secrets Scanning — Gitleaks
# ============================================================
jobs:
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        # SHA-pinned: actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Gitleaks tüm commit geçmişini taraması için full history gerekli
          fetch-depth: 0

      - name: Run Gitleaks secrets scan
        # SHA-pinned: gitleaks/gitleaks-action@v2.3.9
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Org seviyesi taramalar için gerekli (private repo):
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================================
  # JOB 2: Build & Test
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 21 with Maven cache
        # SHA-pinned: actions/setup-java@v4.7.0
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build & run tests
        # Güvenlik pipeline'ında testler ASLA atlanmamalı
        run: mvn clean verify

      - name: Upload build artifact
        # SHA-pinned: actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-artifact
          path: target/*.jar
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 3: SAST — Semgrep (Docker container — action deprecated)
  # ============================================================
  sast-semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    container:
      # Deprecated semgrep-action yerine resmi Docker imajı kullanılıyor
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Run Semgrep CI scan
        # Java, Spring ve OWASP Top 10 kuralları ile tarama
        run: |
          semgrep ci \
            --config "p/java" \
            --config "p/spring" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF to GitHub Security tab
        # SHA-pinned: github/codeql-action/upload-sarif@v3.28.9
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ============================================================
  # JOB 4: SAST — CodeQL (derin dataflow analizi)
  # ============================================================
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read # CodeQL action için zorunlu

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Initialize CodeQL
        # SHA-pinned: github/codeql-action/init@v3.28.9
        uses: github/codeql-action/init@45775bd8235c68ba998cffa5171334d58593da47
        with:
          languages: java
          # Geniş kapsamlı güvenlik + kalite kuralları
          queries: security-extended,security-and-quality

      - name: Build for CodeQL analysis
        # Build job'da test zaten çalıştı, burada tekrar çalıştırmaya gerek yok
        run: mvn clean verify -DskipTests

      - name: Perform CodeQL Analysis
        # SHA-pinned: github/codeql-action/analyze@v3.28.9
        uses: github/codeql-action/analyze@45775bd8235c68ba998cffa5171334d58593da47
        with:
          category: codeql-java

  # ============================================================
  # JOB 5: SCA — OWASP Dependency-Check (Maven Plugin)
  # ============================================================
  sca-owasp:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: build # Derlenmiş artifact üzerinde tarama
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Download build artifact
        # SHA-pinned: actions/download-artifact@v4.2.1
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifact
          path: target/

      - name: Run OWASP Dependency-Check (Maven Plugin)
        # Deprecated GitHub Action yerine doğrudan Maven plugin kullanılıyor.
        # Bu yöntem SHA pinleme sorununu ortadan kaldırır ve daha stabil çalışır.
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=ALL \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DsuppressionFile=.github/owasp-suppressions.xml
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47
        if: always()
        with:
          sarif_file: target/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload OWASP HTML Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 14

  # ============================================================
  # JOB 6: SCA + SBOM — Trivy
  # ============================================================
  sca-trivy:
    name: SCA + SBOM — Trivy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifact
          path: target/

      - name: Run Trivy — filesystem vulnerability scan
        # SHA-pinned: aquasecurity/trivy-action@0.30.0
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Zafiyet, secret ve lisans taraması birlikte
          scanners: 'vuln,secret,license'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Generate SBOM (CycloneDX format)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
          # SBOM üretimi hiçbir zaman build'i bloklamamalı
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          # SBOM'lar uyumluluk amacıyla uzun süre saklanmalı
          retention-days: 90

  # ============================================================
  # JOB 7: Security Gate — Tüm job'ların tek merge-blocking check'i
  # ============================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Bu job ancak TÜM güvenlik job'ları başarılı olursa geçer.
    # Branch protection rules'da sadece bu job'u zorunlu check olarak tanımla.
    needs:
      - secrets-scan
      - build
      - sast-semgrep
      - sast-codeql
      - sca-owasp
      - sca-trivy
    permissions:
      contents: read

    steps:
      - name: All security checks passed
        run: |
          echo "✅ Secrets scan    : passed (Gitleaks)"
          echo "✅ Build & tests   : passed"
          echo "✅ SAST Semgrep    : passed"
          echo "✅ SAST CodeQL     : passed"
          echo "✅ SCA OWASP DC    : passed (Maven Plugin)"
          echo "✅ SCA + SBOM Trivy: passed"
          echo ""
          echo "🔒 Security Gate: TÜM KONTROLLER BAŞARILI — Merge güvenli."