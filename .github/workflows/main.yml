# ============================================================
# Secure AppSec Pipeline — Java Spring Boot
# ============================================================
# Improvements over original:
#   - All actions SHA-pinned (supply chain hardening)
#   - Least-privilege permissions per job
#   - Parallel security jobs (faster feedback)
#   - Secrets scanning via Gitleaks
#   - Deep SAST via Semgrep + CodeQL
#   - SCA via OWASP Dependency-Check + Trivy
#   - SBOM generation via Trivy (CycloneDX)
#   - SARIF upload to GitHub Security tab
#   - Maven dependency caching
#   - Explicit security gates per tool
#   - Concurrency control to cancel stale PR runs
#   - Timeout guards on all jobs
# ============================================================

name: AppSec Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # Allow manual re-scans

# Cancel in-progress runs for the same PR/branch to avoid redundant scans
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default: grant the minimum possible permissions at workflow level.
# Each job below elevates only what it specifically needs.
permissions:
  contents: read

# ============================================================
# JOB 1: Secrets Scanning (runs first — fastest feedback)
# ============================================================
jobs:
  secrets-scan:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      # security-events: write is needed to upload SARIF to the Security tab
      security-events: write

    steps:
      - name: Checkout code
        # SHA-pinned: actions/checkout@v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          # Full history needed for Gitleaks to scan all commits, not just HEAD
          fetch-depth: 0

      - name: Run Gitleaks secrets scan
        # SHA-pinned: gitleaks/gitleaks-action@v2.3.9
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for org-level scans; optional for public repos
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================================
  # JOB 2: Build (runs in parallel with secrets scan)
  # ============================================================
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 21 with Maven cache
        # SHA-pinned: actions/setup-java@v4.7.0
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          # Built-in Maven dependency caching — avoids re-downloading on every run
          cache: 'maven'

      - name: Build project (with tests)
        # Do NOT skip tests in a security pipeline.
        # Tests validate correctness before security tooling runs.
        run: mvn clean verify

      # Upload the compiled JAR/WAR as an artifact so downstream jobs
      # can scan the build output without re-compiling.
      - name: Upload build artifact
        # SHA-pinned: actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-artifact
          path: target/*.jar
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 3: SAST — Semgrep (parallel, depends only on checkout)
  # ============================================================
  sast-semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep   # <-- action yok, direkt Docker imajı
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep CI
        run: semgrep ci --sarif > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ============================================================
  # JOB 4: SAST — CodeQL (parallel, deeper dataflow analysis)
  # ============================================================
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read # Required by CodeQL action

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Initialize CodeQL
        # SHA-pinned: github/codeql-action/init@v3.28.9
        uses: github/codeql-action/init@45775bd8235c68ba998cffa5171334d58593da47
        with:
          languages: java
          # Use the security-extended suite for broader vulnerability detection
          queries: security-extended,security-and-quality

      - name: Build for CodeQL analysis
        run: mvn clean verify -DskipTests
        # Note: CodeQL requires a build but we already ran tests in the build job.
        # Skipping tests here to avoid redundancy while still producing compiled classes.

      - name: Perform CodeQL Analysis
        # SHA-pinned: github/codeql-action/analyze@v3.28.9
        uses: github/codeql-action/analyze@45775bd8235c68ba998cffa5171334d58593da47
        with:
          category: codeql-java

  # ============================================================
  # JOB 5: SCA — OWASP Dependency-Check (requires build artifact)
  # ============================================================
  sca-owasp:
  name: SCA — OWASP Dependency-Check
  runs-on: ubuntu-24.04
  timeout-minutes: 30
  needs: build
  permissions:
    contents: read
    security-events: write

  steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Run OWASP Dependency-Check (Maven Plugin)
      run: |
        mvn org.owasp:dependency-check-maven:check \
          -DfailBuildOnCVSS=7 \
          -Dformat=ALL \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DsuppressionFile=.github/owasp-suppressions.xml
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

    - name: Upload SARIF to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: target/dependency-check-report.sarif
        category: owasp-dependency-check

    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-report
        path: target/dependency-check-report.html
        retention-days: 14

  # ============================================================
  # JOB 6: SCA + SBOM — Trivy (parallel with OWASP)
  # ============================================================
  sca-trivy:
    name: SCA + SBOM — Trivy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: build-artifact
          path: target/

      - name: Run Trivy — filesystem vulnerability scan
        # SHA-pinned: aquasecurity/trivy-action@0.30.0
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          # Fail on HIGH and CRITICAL CVEs
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          # Output SARIF for GitHub Security tab
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Scan Java dependencies (pom.xml + compiled JARs)
          scanners: 'vuln,secret,license'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      - name: Generate SBOM with Trivy (CycloneDX format)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'
          exit-code: '0' # SBOM generation should never block the build

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90 # SBOMs should be retained for compliance purposes

  # ============================================================
  # JOB 7: Security Gate — Summary (requires all security jobs)
  # ============================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # This job only passes if ALL security jobs pass.
    # It serves as the single merge-blocking status check to configure
    # in your branch protection rules.
    needs:
      - secrets-scan
      - build
      - sast-semgrep
      - sast-codeql
      - sca-owasp
      - sca-trivy
    permissions:
      contents: read

    steps:
      - name: All security checks passed
        run: |
          echo "✅ Secrets scan: passed"
          echo "✅ Build & tests: passed"
          echo "✅ SAST (Semgrep): passed"
          echo "✅ SAST (CodeQL): passed"
          echo "✅ SCA (OWASP DC): passed"
          echo "✅ SCA + SBOM (Trivy): passed"
          echo ""
          echo "🔒 Security gate: ALL CHECKS PASSED. Safe to merge."